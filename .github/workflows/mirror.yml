name: Mirror Repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Mirror repository
        run: |
          git config --global user.name "mirror-bot"
          git config --global user.email "mirror@github.com"

          git remote add mirror https://x-access-token:${{ secrets.DEVHASHTECH }}@github.com/dev-HashTech/WB2026.git

          git push --mirror mirror
